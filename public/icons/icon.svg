<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Chip ring -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="#3b82f6" stroke-width="12" opacity="0.3"/>
  <circle cx="256" cy="240" r="140" fill="none" stroke="#3b82f6" stroke-width="12" stroke-dasharray="22 22" opacity="0.6"/>
  <!-- Inner circle -->
  <circle cx="256" cy="240" r="105" fill="#1e293b" stroke="#60a5fa" stroke-width="3"/>
  <!-- Dollar sign -->
  <text x="256" y="262" text-anchor="middle" dominant-baseline="central" font-family="Arial,sans-serif" font-weight="900" font-size="120" fill="#3b82f6">$</text>
  <!-- App name -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="48" fill="#94a3b8">POKER</text>
</svg>
